<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuestra Boda</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/estilos.css" />
  </head>
  <body class="color-fondo">
    <div class="row">
        <div class="col-12 col-md-6 primera-seccion">
            <div class="contenedor-invitacion">
                <img src="assets/imagenes/hoja-borde.svg" alt="" class="decoracion-esquina"/>
                <div style=" display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center; margin-top: -40px; margin-bottom: 50px;">
                    <svg viewBox="0 0 500 120" width="100%" height="200px">
                        <path id="curva-boda" d="M 50,150 Q 250,50 450,150" fill="transparent"/>
                        <text font-family="Garamond" font-size="50" fill="#000000">
                            <textPath xlink:href="#curva-boda" startOffset="50%" text-anchor="middle">¡Nos casamos!</textPath>
                        </text>
                    </svg>
                    <img src="assets/imagenes/hoja-centro.svg" alt="" style="margin-top: -40px; width: 25%;"/>
                </div>
            </div>
            <div style="display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center; margin-top: -25px;">
                <p style="font-family: Garamond; font-size: 43px; color: #604C38;">Eduardo & Kathy</p>
                <p style="font-family: Garamond; font-size: 15px; color: #604C38;">&#9672;&#8212;&#8212;&#8212;     25. 04. 2026    &#8212;&#8212;&#9672;</p>
            </div>
            <div style="display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center; margin-top: 120px;">
              <p style="font-family: Garamond; font-size: 15px; color: #604C38;">"Así que ya no son dos, sino uno solo. Por tanto, lo que Dios unió, que no lo separe el hombre"</p>
              <p style="font-family: Garamond; font-size: 10px; color: #604C38;">Mateo 19:6</p>
            </div>
      </div>
      <div class="col-12 col-md-6 segunda-seccion" style="display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center;">
        <div class="hoja-derecha">
          <img src="assets/imagenes/hoja-derecha.svg" alt="" class="decoracion-hojas-fotos" />
        </div>
        <div class="hoja-izquierda">
          <img src="assets/imagenes/hoja-izquierda.svg" alt="" class="decoracion-hojas-fotos"/>
        </div>
        <div class="cuadrado-redondeado" style="display: flex; justify-content: center; align-items: center; flex-direction: column; text-align: center; position: relative;">
            <div class="cuadrado-redondeado-interno">
              <div class="fondo fondo1"></div>
              <div class="fondo fondo2"></div>
            </div>
        </div>
        
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
